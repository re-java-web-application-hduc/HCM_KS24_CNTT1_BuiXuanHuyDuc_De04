<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin sản phẩm</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
</head>
<body>
<div class="container">
    <h2 th:text="${product.id == null ? 'Thêm mới sản phẩm' : 'Cập nhật sản phẩm'}"></h2>

    <form th:action="@{/products/save}" th:object="${product}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label>Tên sản phẩm:</label>
            <input type="text" th:field="*{productName}" placeholder="Nhập tên sản phẩm..." />
            <span class="error" th:if="${#fields.hasErrors('productName')}" th:errors="*{productName}"></span>
        </div>

        <div class="form-group">
            <label>Danh mục:</label>
            <select th:field="*{category}">
                <option value="">-- Chọn danh mục --</option>
                <option value="Điện tử">Điện tử</option>
                <option value="Thời trang">Thời trang</option>
                <option value="Gia dụng">Gia dụng</option>
            </select>
            <span class="error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></span>
        </div>

        <div class="form-group">
            <label>Giá (VNĐ):</label>
            <input type="number" th:field="*{price}" step="any" />
            <span class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
        </div>

        <div class="form-group">
            <label>Số lượng tồn kho:</label>
            <input type="number" th:field="*{stock}" />
            <span class="error" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></span>
        </div>

        <div class="form-group">
            <label>Mô tả:</label>
            <textarea th:field="*{description}" rows="4" placeholder="Nhập mô tả sản phẩm..."></textarea>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn-save">Lưu lại</button>
            <a th:href="@{/products}" class="btn-back">Quay lại</a>
        </div>
    </form>
</div>
</body>
</html>
